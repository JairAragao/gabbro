<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gabbro</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231b222d'/><rect x='5' y='7' width='9' height='18' rx='2' fill='%237fd1e6'/><rect x='18' y='7' width='9' height='18' rx='2' fill='%23c99bf0'/><line x1='14' y1='13' x2='18' y2='13' stroke='%23dfe6f0' stroke-width='1.6'/></svg>">
<meta name="theme-color" content="#232a36">
<link rel="stylesheet" href="css/app.css">
</head>
<body class="mode-view">
  <div id="toolbar">
    <span class="logo">Gabbro</span>
    <span class="meta" id="repoName"></span>
    <nav id="tabs">
      <button class="tab on" data-tab="diagram">Diagram</button>
      <button class="tab" data-tab="docs">Docs</button>
    </nav>
    <select id="branchSel" title="Branch"></select>
    <button class="btn" id="btnRefresh" title="Fetch latest from remote">&#10227;</button>
    <button class="btn" id="btnDiff" title="Compare two branches">Diff</button>
    <span id="diffCtrls" class="hidden">
      <select id="diffBase" title="Base branch"></select>
      <span class="diff-arrow">&rarr;</span>
      <select id="diffTarget" title="Target branch"></select>
    </span>
    <span class="meta" id="meta"></span>
    <span class="spacer"></span>
    <div id="searchWrap">
      <select id="searchScope" title="Search scope">
        <option value="all" selected>All</option>
        <option value="tables">Tables</option>
        <option value="columns">Columns</option>
      </select>
      <input id="search" placeholder="Search&hellip;" autocomplete="off" title="Enter = next match, Shift+Enter = previous">
      <span id="searchCount" class="hidden"></span>
      <button id="searchPrev" class="search-nav hidden" title="Previous match (Shift+Enter)">‹</button>
      <button id="searchNext" class="search-nav hidden" title="Next match (Enter)">›</button>
    </div>
    <div id="modeToggle">
      <button id="modeView" class="on">View</button>
      <button id="modeEdit">Edit</button>
    </div>
    <button class="btn primary" id="btnSaveDbml" hidden>Save DBML</button>
    <button class="btn primary" id="btnSavePos" hidden>Save positions</button>
  </div>

  <div id="banner" class="hidden"></div>

  <div id="main">
    <section id="diagramSection">
      <div id="editorPane" class="hidden">
        <div id="edHead"><span class="dot" id="edDot"></span><span id="edStatus">ready</span>
          <span class="spacer"></span><span class="edhint">editing re-renders live</span></div>
        <div id="edWrap">
          <div id="gutter">1</div>
          <div id="codeBox">
            <pre id="hl" aria-hidden="true"><code></code></pre>
            <textarea id="code" spellcheck="false" placeholder="DBML source&hellip;"></textarea>
          </div>
        </div>
      </div>
      <div id="splitter"></div>

      <div id="viewport">
        <div id="world"><svg id="svg"></svg></div>
        <div id="zoombar">
          <button class="btn sm" id="btnFit" title="Fit diagram to view">Fit</button>
          <button class="btn sm" id="btnOrtho" title="Route edges around tables">Route</button>
          <button class="btn sm" id="btnHl" title="Highlight relationships on hover (heavy on large diagrams)">Hover</button>
          <div class="z" id="zout"></div><div class="lvl" id="zlvl">100%</div><div class="z" id="zin"></div>
        </div>
        <div class="hint">wheel=zoom &middot; background=pan &middot; header=move table &middot; group label=move group &middot; double-click=open in editor</div>
      </div>
    </section>

    <section id="docsSection" class="hidden">
      <aside id="docsSidebar">
        <input id="docsSearch" placeholder="Filter tables&hellip;" autocomplete="off">
        <nav id="docsIndex"></nav>
      </aside>
      <div id="docsContent"></div>
    </section>
  </div>

  <div id="tip"></div>
  <div id="palette">
    <div class="pal-title">Header color</div>
    <div class="pal-grid" id="palGrid"></div>
    <div class="pal-custom"><input type="color" id="palCustom"><span>custom</span></div>
  </div>
  <div id="toast"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
