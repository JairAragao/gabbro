<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gabbro mark — "G no cristal" (D0): faceted hexagon in near-equal charcoals,
       pale-green G with a light edge on top. -->
  <g stroke="#0f1315" stroke-width=".7" stroke-opacity=".4" stroke-linejoin="round">
    <polygon points="50,4 89,26.5 50,50" fill="#272e32"/>
    <polygon points="89,26.5 89,71.5 50,50" fill="#1d2225"/>
    <polygon points="89,71.5 50,96 50,50" fill="#23292e"/>
    <polygon points="50,96 11,71.5 50,50" fill="#181d20"/>
    <polygon points="11,71.5 11,26.5 50,50" fill="#212729"/>
    <polygon points="11,26.5 50,4 50,50" fill="#2b3236"/>
  </g>
  <path d="M 69,33 L 52,23 L 32,35 L 32,64 L 52,76 L 69,66 L 69,51 L 52,51"
        fill="none" stroke="#8fb3a0" stroke-width="8"
        stroke-linejoin="bevel" stroke-linecap="square"/>
  <path d="M 69,33 L 52,23 L 32,35" fill="none" stroke="#d7e2d4" stroke-width="2.6"
        stroke-linejoin="bevel" stroke-linecap="square"/>
</svg>
